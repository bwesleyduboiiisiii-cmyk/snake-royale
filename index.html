<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Snake Royale — TikTok LIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#070714; --deep:#0d0d24; --panel:#121236; --grid:#1c2b52;
    --ink:#eef0ff; --muted:#8b93c9;
    --cyan:#39e0ff; --lime:#c6ff3d; --gold:#ffcf3d; --magenta:#ff2d75; --violet:#8a5bff;
    --ok:#37e39b; --bad:#ff5d6c;
    --display:"Bungee", system-ui, sans-serif;
    --ui:"Chakra Petch", ui-monospace, system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:
      radial-gradient(1200px 700px at 50% -10%, #171742 0%, transparent 60%),
      radial-gradient(900px 600px at 100% 110%, #241350 0%, transparent 55%),
      var(--void);
    color:var(--ink); font-family:var(--ui); overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  body.transparent{background:transparent}
  #stage{position:fixed; inset:0}
  canvas{position:absolute; inset:0; width:100%; height:100%; display:block}

  /* ---------- Host control bar ---------- */
  #controls{
    position:fixed; top:10px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center;
    background:rgba(12,12,40,.82); backdrop-filter:blur(10px);
    border:1px solid #2a2a5e; border-radius:14px; padding:8px 10px;
    z-index:40; max-width:min(96vw,1100px); box-shadow:0 12px 40px rgba(0,0,0,.5);
    transition:transform .25s ease, opacity .25s ease;
  }
  #controls.hidden{transform:translate(-50%,-140%); opacity:0; pointer-events:none}
  #controls input[type=text]{
    background:#0a0a20; border:1px solid #2f2f66; color:var(--ink);
    border-radius:9px; padding:8px 10px; font-family:var(--ui); font-size:13px; min-width:120px;
  }
  #controls input:focus{outline:none; border-color:var(--cyan)}
  .btn{
    font-family:var(--ui); font-weight:600; font-size:13px; letter-spacing:.02em;
    border:1px solid #33336b; background:#1a1a44; color:var(--ink);
    padding:8px 12px; border-radius:9px; cursor:pointer; white-space:nowrap;
    transition:transform .08s, background .15s, border-color .15s;
  }
  .btn:hover{background:#23235a; border-color:#4a4a92}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:linear-gradient(180deg,var(--magenta),#d31659); border-color:#ff5c92; color:#fff}
  .btn.go{background:linear-gradient(180deg,var(--lime),#8fd400); border-color:#d9ff7a; color:#111}
  .btn.ghost{background:transparent}
  .btn.fx{background:#241a3e; border-color:#4a2f7a; font-size:12px; padding:7px 10px}
  .btn.fx:hover{background:#33245a; border-color:#7a4fc0}
  #clearBtn{border-color:#7a2f3a; color:#ffb3c0}
  #clearBtn:hover{background:#3a1a22}
  .fxlabel{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .miniSel{background:#1a1a44;color:var(--ink);border:1px solid #33336b;border-radius:7px;padding:4px 6px;font-family:var(--ui);font-size:12px;cursor:pointer}
  input.vol{width:90px;accent-color:var(--gold);cursor:pointer}
  .player{position:relative}
  .kickBtn{margin-left:2px; width:20px;height:20px;flex:none; border-radius:50%; border:1px solid #7a2f3a; background:#2a1420; color:#ff8095; font-size:11px; line-height:1; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center}
  .kickBtn:hover{background:#4a1f2e; color:#fff}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);display:inline-block;box-shadow:0 0 8px currentColor}
  .dot.on{background:var(--ok);color:var(--ok)}
  .dot.wait{background:var(--gold);color:var(--gold);animation:pulse 1s infinite}
  .dot.err{background:var(--bad);color:var(--bad)}
  #statusText{font-size:12px;color:var(--muted);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sep{width:1px;height:26px;background:#2c2c5e;margin:0 2px}
  label.toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer}
  label.toggle input{accent-color:var(--cyan)}

  #showBar{
    position:fixed; top:8px; left:50%; transform:translateX(-50%);
    z-index:39; background:rgba(12,12,40,.8); border:1px solid #2a2a5e;
    border-radius:10px; padding:5px 12px; font-size:12px; color:var(--muted);
    cursor:pointer; display:none;
  }
  #showBar.show{display:block}

  /* ---------- HUD ---------- */
  .hud{position:fixed; z-index:20; pointer-events:none; font-weight:600}
  #hudPhase{top:14px; left:16px; display:flex; gap:8px; align-items:center}
  .pill{background:rgba(9,9,30,.72); border:1px solid #2c2c5e; border-radius:999px;
        padding:6px 14px; font-size:14px; letter-spacing:.06em; text-transform:uppercase;
        backdrop-filter:blur(6px)}
  .pill .accent{color:var(--cyan)}
  #hudRight{top:14px; right:16px; display:flex; gap:8px; align-items:center; flex-direction:column; align-items:flex-end}
  #stormWrap{width:190px; background:rgba(9,9,30,.72); border:1px solid #2c2c5e; border-radius:999px; padding:6px 12px; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--magenta)}
  #stormBar{height:5px; background:#2a1030; border-radius:4px; margin-top:5px; overflow:hidden}
  #stormFill{height:100%; width:0%; background:linear-gradient(90deg,var(--gold),var(--magenta)); transition:width .2s linear}

  /* ---------- Feed ticker ---------- */
  #feed{position:fixed; left:16px; bottom:16px; z-index:20; width:min(340px,42vw); display:flex; flex-direction:column-reverse; gap:6px; pointer-events:none}
  .feedItem{background:rgba(9,9,30,.72); border:1px solid #26264f; border-left:3px solid var(--cyan);
    border-radius:8px; padding:6px 10px; font-size:12.5px; color:var(--ink);
    display:flex; align-items:center; gap:8px; backdrop-filter:blur(6px);
    animation:slideIn .25s ease; transition:opacity .45s ease, transform .45s ease}
  .feedItem.out{opacity:0; transform:translateX(-12px)}
  .feedItem img{width:20px;height:20px;border-radius:50%;object-fit:cover;flex:none}
  .feedItem.gift{border-left-color:var(--gold)}
  .feedItem.like{border-left-color:var(--magenta)}
  .feedItem.share{border-left-color:var(--cyan)}
  .feedItem.join{border-left-color:var(--lime)}
  .feedItem.kill{border-left-color:#ff3b6b}

  /* ---------- Legend ---------- */
  #legend{position:fixed; right:16px; bottom:16px; z-index:20; display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; pointer-events:none; max-width:46vw}
  #leaderboard{position:fixed; left:16px; top:70px; z-index:20; width:250px; background:rgba(9,9,30,.82); border:1px solid #2c2c5e; border-radius:12px; padding:10px 12px; backdrop-filter:blur(8px); pointer-events:none}
  #leaderboard.hidden{display:none}
  .lbtitle{font-family:var(--display); font-size:13px; color:var(--gold); letter-spacing:.04em; margin-bottom:8px; text-align:center}
  .lbrow{display:flex; align-items:center; gap:8px; padding:3px 0; font-size:13px; color:var(--ink)}
  .lbrow img{width:22px;height:22px;border-radius:50%;object-fit:cover;flex:none}
  .lbdot{width:22px;height:22px;border-radius:50%;background:#333;flex:none}
  .lbrank{display:inline-block;width:20px;text-align:center;color:var(--muted);font-size:12px}
  .lbname{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .lbwins{color:var(--gold); font-weight:700; font-size:12px}
  .leg{background:rgba(9,9,30,.72); border:1px solid #26264f; border-radius:999px; padding:6px 12px; font-size:12px; display:flex; gap:7px; align-items:center; backdrop-filter:blur(6px)}
  .leg b{font-weight:700}
  .leg.like b{color:var(--magenta)} .leg.share b{color:var(--cyan)} .leg.gift b{color:var(--gold)}

  /* ---------- Big center overlays ---------- */
  #overlay{position:fixed; inset:0; z-index:30; display:flex; align-items:center; justify-content:center; pointer-events:none}
  .card{text-align:center; max-width:92vw}
  .kicker{font-family:var(--ui); letter-spacing:.35em; text-transform:uppercase; color:var(--cyan); font-size:clamp(12px,1.4vw,16px); margin-bottom:10px}
  .headline{font-family:var(--display); font-size:clamp(38px,7vw,104px); line-height:.98; letter-spacing:.01em;
    background:linear-gradient(180deg,#fff, #a9b3ff); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 40px rgba(138,91,255,.35)}
  .sub{margin-top:14px; font-size:clamp(14px,1.8vw,20px); color:var(--muted); letter-spacing:.02em}
  .actions{margin-top:22px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap}
  .actions .chip{font-family:var(--display); font-size:clamp(13px,1.6vw,18px); padding:10px 18px; border-radius:999px;
    background:rgba(10,10,30,.6); border:1px solid #33336b}
  .actions .chip.j{border-color:var(--lime); color:var(--lime)}
  .actions .chip.l{border-color:var(--magenta); color:var(--magenta)}
  .actions .chip.s{border-color:var(--cyan); color:var(--cyan)}
  .actions .chip.g{border-color:var(--gold); color:var(--gold)}

  /* countdown ring */
  #ring{margin:26px auto 0; width:120px; height:120px; position:relative}
  #ring svg{transform:rotate(-90deg)}
  #ringNum{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:var(--display); font-size:44px; color:#fff}

  /* winner */
  .winAvatar{width:clamp(120px,18vw,210px); height:clamp(120px,18vw,210px); border-radius:50%;
    margin:0 auto 6px; position:relative; display:flex; align-items:center; justify-content:center;
    background:conic-gradient(from 0deg,var(--gold),#fff6c9,var(--gold),#ffb03d,var(--gold));
    box-shadow:0 0 60px rgba(255,207,61,.6); animation:spinRing 6s linear infinite}
  .winAvatar .inner{width:calc(100% - 14px); height:calc(100% - 14px); border-radius:50%; overflow:hidden; background:#12122e; display:flex; align-items:center; justify-content:center}
  .winAvatar .inner img{width:100%;height:100%;object-fit:cover}
  .winAvatar .inner .letter{font-family:var(--display); font-size:clamp(40px,7vw,90px)}
  .winName{font-family:var(--display); font-size:clamp(26px,4.2vw,58px); margin-top:8px; color:#fff; text-shadow:0 0 30px rgba(255,207,61,.5)}
  .winStats{margin-top:10px; color:var(--muted); font-size:clamp(13px,1.6vw,18px)}

  .lobbyList{margin:22px auto 0; display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:min(880px,92vw); max-height:34vh; overflow:hidden}
  .player{display:flex; align-items:center; gap:8px; background:rgba(10,10,30,.6); border:1px solid #2c2c5e; border-radius:999px; padding:5px 12px 5px 5px; animation:slideIn .25s ease}
  .player .av{width:30px;height:30px;border-radius:50%; overflow:hidden; background:#222; display:flex; align-items:center; justify-content:center; flex:none}
  .player .av img{width:100%;height:100%;object-fit:cover}
  .player .av .letter{font-family:var(--display); font-size:15px}
  .player .nm{font-size:13px; max-width:130px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}

  /* ---------- Settings modal ---------- */
  #settings{position:fixed; inset:0; z-index:60; background:rgba(3,3,12,.66); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center}
  #settings.open{display:flex}
  .modal{background:var(--panel); border:1px solid #33336b; border-radius:16px; padding:22px; width:min(560px,94vw); max-height:88vh; overflow:auto}
  .modal h2{font-family:var(--display); font-size:22px; margin:0 0 4px}
  .modal p.hint{color:var(--muted); font-size:12px; margin:0 0 16px}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .field{display:flex; flex-direction:column; gap:4px}
  .field label{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em}
  .field input{background:#0a0a20; border:1px solid #2f2f66; color:var(--ink); border-radius:8px; padding:8px 10px; font-family:var(--ui); font-size:14px}
  .field.full{grid-column:1/-1}
  .modalFoot{display:flex; justify-content:flex-end; gap:8px; margin-top:18px}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes slideIn{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
  @keyframes spinRing{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){ .winAvatar{animation:none} }
  @media (max-width:640px){ #legend{display:none} #feed{width:70vw} }
</style>

<body>
  <div id="stage"><canvas id="cv"></canvas></div>

  <!-- HUD -->
  <div class="hud" id="hudPhase"><span class="pill" id="phasePill">LOBBY</span><span class="pill" id="roundPill">Round <span class="accent" id="roundNum">1</span></span></div>
  <div class="hud" id="hudRight">
    <span class="pill" id="countPill"><span class="accent" id="aliveNum">0</span> / <span id="totalNum">0</span> snakes</span>
    <div id="stormWrap" style="display:none">⚡ Storm closing<div id="stormBar"><div id="stormFill"></div></div></div>
  </div>

  <div id="feed"></div>
  <div id="leaderboard" class="hidden"></div>
  <div id="legend">
    <span class="leg like">❤ <b>Like</b> = boost</span>
    <span class="leg share">🌹 <b>Rose</b> = shield</span>
    <span class="leg gift">🫰 <b>Finger Heart</b> = rampage</span>
  </div>

  <!-- Big overlays -->
  <div id="overlay"></div>

  <!-- Host controls -->
  <div id="controls">
    <span class="dot" id="connDot" title="connection"></span>
    <input type="text" id="userInput" placeholder="@tiktok_username" autocomplete="off" spellcheck="false" />
    <button class="btn primary" id="connectBtn">Connect</button>
    <span id="statusText">Enter the live host’s @username.</span>
    <span class="sep"></span>
    <button class="btn go" id="startBtn">Start now</button>
    <button class="btn" id="skipBtn">Skip round</button>
    <button class="btn" id="clearBtn" title="remove everyone from the lobby">Clear all</button>
    <span class="sep"></span>
    <span class="fxlabel">Test FX:</span>
    <button class="btn fx" id="fxBoost" title="apply a boost to a player">⚡ Boost</button>
    <button class="btn fx" id="fxShield" title="give a player a shield (Rose)">🌹 Shield</button>
    <button class="btn fx" id="fxRampage" title="trigger rampage on a player (Finger Heart)">🫰 Rampage</button>
    <span class="sep"></span>
    <label class="toggle" style="gap:4px">Difficulty
      <select id="diffSel" class="miniSel">
        <option value="chill">Chill</option>
        <option value="normal">Normal</option>
        <option value="hard">Hard</option>
        <option value="insane">Insane</option>
      </select>
    </label>
    <span class="sep"></span>
    <label class="toggle" style="gap:6px">🔊 Applause
      <input type="range" id="applauseVol" class="vol" min="0" max="100" value="70" title="winner applause volume">
    </label>
    <span class="sep"></span>
    <label class="toggle"><input type="checkbox" id="simChk" /> Test bots</label>
    <button class="btn ghost" id="soundBtn" title="sound">🔇</button>
    <button class="btn ghost" id="gearBtn" title="settings">⚙</button>
    <button class="btn ghost" id="hideBtn" title="hide controls (H)">Hide</button>
  </div>
  <div id="showBar">◂ Show controls (H)</div>

  <!-- Settings -->
  <div id="settings">
    <div class="modal">
      <h2>Game settings</h2>
      <p class="hint">Changes apply to the next round. Nothing is saved to disk — reload resets to defaults (or pass them as URL options).</p>
      <div class="grid2">
        <div class="field full"><label>Bridge WebSocket URL</label><input id="setWs" type="text" /></div>
        <div class="field"><label>Join window (seconds)</label><input id="setLobby" type="number" min="10" max="600" /></div>
        <div class="field"><label>Winner screen (seconds)</label><input id="setWinner" type="number" min="3" max="60" /></div>
        <div class="field"><label>Min players to start</label><input id="setMin" type="number" min="1" max="30" /></div>
        <div class="field"><label>Max snakes per round</label><input id="setMax" type="number" min="2" max="60" /></div>
        <div class="field"><label>Snake speed (ms/step, lower=faster)</label><input id="setTick" type="number" min="50" max="300" /></div>
        <div class="field"><label>Likes per growth</label><input id="setLikeGrow" type="number" min="1" max="500" /></div>
        <div class="field"><label>Gift diamonds → shield</label><input id="setShieldD" type="number" min="1" max="1000" /></div>
        <div class="field"><label>Gift diamonds → RAMPAGE</label><input id="setRampD" type="number" min="1" max="10000" /></div>
        <div class="field full"><label>Join keywords (comma separated)</label><input id="setWords" type="text" /></div>
        <div class="field full"><label class="toggle"><input id="setAuto" type="checkbox" /> Auto-join anyone who likes/comments/shares/gifts</label></div>
      </div>
      <div class="modalFoot">
        <button class="btn" id="setCancel">Close</button>
        <button class="btn primary" id="setSave">Save</button>
      </div>
    </div>
  </div>

<script>
(function(){
"use strict";

/* ============================ CONFIG ============================ */
const params = new URLSearchParams(location.search);
const CONFIG = {
  COLS:52, ROWS:30,
  tickMs:110,
  lobbySeconds:60,
  winnerSeconds:9,
  minPlayers:2,
  maxPlayers:30,
  startLen:4,
  foodCount:14,
  shieldMs:6000,
  rampageMs:6000,
  shieldDiamonds:10,
  rampageDiamonds:100,
  likesPerGrow:30,
  stormStartSec:15,
  stormFullSec:95,
  hardCapSec:135,
  joinWords:["join","play","snake"],
  autoJoin:false,
  difficulty:"hard",   // chill | normal | hard | insane
  aiCaution:0.28,      // lower = snakes take more risks / trap themselves more
  aiJitter:0.9,        // higher = more erratic movement
  wsUrl: params.get("ws") || "ws://localhost:8081",
  // Supabase (cloud mode). Fill SB_URL/SB_ANON below, or pass ?sb=...&key=... in the URL.
  sbUrl: params.get("sb") || (window.SB_URL || ""),
  sbAnon: params.get("key") || (window.SB_ANON || ""),
};
if(params.get("bg")==="transparent") document.body.classList.add("transparent");

/* ============================ DIFFICULTY ============================ */
// Snakes auto-play; difficulty scales speed, how fast the storm closes, and how reckless they are.
const DIFF={
  chill:  { tickMs:130, stormStartSec:25, stormFullSec:120, aiCaution:0.8,  aiJitter:0.3 },
  normal: { tickMs:110, stormStartSec:15, stormFullSec:95,  aiCaution:0.5,  aiJitter:0.6 },
  hard:   { tickMs:90,  stormStartSec:10, stormFullSec:70,  aiCaution:0.28, aiJitter:0.9 },
  insane: { tickMs:70,  stormStartSec:6,  stormFullSec:50,  aiCaution:0.12, aiJitter:1.3 },
};
function setDifficulty(level){
  const d=DIFF[level]||DIFF.hard; CONFIG.difficulty=DIFF[level]?level:"hard";
  CONFIG.tickMs=d.tickMs; CONFIG.stormStartSec=d.stormStartSec; CONFIG.stormFullSec=d.stormFullSec;
  CONFIG.aiCaution=d.aiCaution; CONFIG.aiJitter=d.aiJitter;
  const sel=document.getElementById("diffSel"); if(sel) sel.value=CONFIG.difficulty;
}

/* ============================ ROLE (sync) ============================ */
// ?role=engine  -> runs the game (put THIS in OBS). Obeys remote commands, broadcasts state.
// ?role=control -> control panel: mirrors the engine's game + kick / start / Test FX. Sends commands.
// (no role)     -> "solo": full standalone game with local controls (default / testing).
const ROLE = (params.get("role")||"solo").toLowerCase();
const IS_CONTROL = ROLE==="control";     // pure mirror + remote control
const IS_ENGINE  = ROLE!=="control";     // solo & engine both simulate
const SHOW_CONTROLS = ROLE==="control" || ROLE==="solo";
let roomChan=null, lastBroadcast=0;

/* ============================ STATE ============================ */
let now = performance.now();
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
let W=0,H=0,dpr=1,cell=0,ox=0,oy=0;

let phase = "lobby";        // lobby | battle | winner
let round = 0;
let lobbyEndsAt = 0, winnerEndsAt = 0, battleStart = 0, lastTick = 0;
let winner = null;

const players = new Map();   // id -> {id,name,avatar,color,likeAccum}
let snakes = [];             // active this round
let roundRoster = [];        // participants of current battle (for winner-by-score)
let foods = [];
let safe = {x0:0,y0:0,x1:CONFIG.COLS,y1:CONFIG.ROWS};
let confetti = [];

let nextBirdAt = 0;
let birdWarnUntil = 0;      // dramatic "INCOMING" flash before the swoop
const BIRD_WARN_MS = 1700;
const BIRD_EVERY = 20000; // every 20s during battle

function spawnBird(){
  const alive = aliveSnakes();
  if(!alive.length){ nextBirdAt = now + BIRD_EVERY; return; }
  // prefer a grabbable (unshielded) target; fall back to any
  const grabbable = alive.filter(s=>!(s.shieldUntil>now) && !(s.rampageUntil>now));
  const target = (grabbable.length?grabbable:alive)[(Math.random()*(grabbable.length?grabbable.length:alive.length))|0];
  bird.targetId = target.id;
  bird.cy = target.head.y;
  bird.dirX = target.head.x < CONFIG.COLS/2 ? 1 : -1;   // fly toward the target's side
  bird.cx = bird.dirX===1 ? -3 : CONFIG.COLS+3;
  bird.carrying=null; bird.carryCells=null; bird.grabbed=false; bird.active=true;
}
function updateBird(dtMs){
  if(phase!=="battle"){ bird.active=false; birdWarnUntil=0; return; }
  if(!bird.active){
    if(birdWarnUntil>0){
      if(now>=birdWarnUntil){ birdWarnUntil=0; spawnBird(); }
    } else if(now>=nextBirdAt && aliveSnakes().length>0){
      birdWarnUntil = now + BIRD_WARN_MS;   // flash the warning first
      ping("bird");
    }
    return;
  }
  const dt=dtMs/1000;
  bird.bob += dt*8;
  bird.cx += bird.dirX * bird.spd * dt;
  const tgt = bird.targetId ? snakes.find(s=>s.id===bird.targetId && s.alive) : null;
  if(!bird.carrying && tgt){
    // dip toward the target's head
    bird.cy += Math.sign(tgt.head.y - bird.cy) * Math.min(Math.abs(tgt.head.y-bird.cy), bird.spd*dt*0.8);
    const near = Math.abs(bird.cx - tgt.head.x) < 1.1 && Math.abs(bird.cy - tgt.head.y) < 1.1;
    const safe = tgt.shieldUntil>now || tgt.rampageUntil>now;
    if(near && !safe){
      // GRAB: pluck the snake out and carry it away
      bird.carrying = tgt.id; bird.carryCells = tgt.cells.slice(0,6);
      const i=snakes.indexOf(tgt); if(i>=0) snakes.splice(i,1);
      addFeed("gift", players.get(tgt.id)||{name:tgt.name,avatar:tgt.avatar}, "🦅 "+tgt.name+" got snatched!");
      ping("gift");
      if(aliveSnakes().length<=1 && !finishing){ finishing=true; slowmoUntil=now+5000; }
    }
  }
  if(bird.carrying){ bird.cy += Math.sign((CONFIG.ROWS*0.15) - bird.cy) * bird.spd*dt*0.4; } // rise while carrying
  // exit
  if(bird.cx < -4 || bird.cx > CONFIG.COLS+4){
    bird.active=false; bird.carrying=null; bird.carryCells=null; bird.targetId=null;
    nextBirdAt = now + BIRD_EVERY;
  }
}
function drawBirdWarning(){
  const active = IS_CONTROL ? mirrorWarn : (birdWarnUntil>now);
  if(!active) return;
  const t = now/1000;
  const pulse = 0.5 + 0.5*Math.sin(t*14);
  const shake = Math.sin(t*40)*4;
  ctx.save();
  // red danger vignette flash
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,`rgba(255,40,40,${0.10+0.14*pulse})`);
  g.addColorStop(0.5,"rgba(255,40,40,0)");
  g.addColorStop(1,`rgba(255,40,40,${0.10+0.14*pulse})`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // banner
  ctx.translate(W/2 + shake, H*0.28);
  ctx.textAlign="center"; ctx.textBaseline="middle";
  const s=1+0.06*pulse; ctx.scale(s,s);
  ctx.font="900 "+Math.round(H*0.11)+"px Bungee, system-ui, sans-serif";
  ctx.lineWidth=Math.max(4,H*0.010); ctx.strokeStyle="rgba(0,0,0,.85)";
  ctx.shadowColor="rgba(255,60,60,.9)"; ctx.shadowBlur=30+40*pulse;
  ctx.fillStyle="#ffd23f";
  ctx.strokeText("🦅 INCOMING!", 0, 0);
  ctx.fillText("🦅 INCOMING!", 0, 0);
  ctx.shadowBlur=0;
  ctx.font="700 "+Math.round(H*0.032)+"px 'Chakra Petch', system-ui, sans-serif";
  ctx.fillStyle="#ffe9a8";
  ctx.fillText("DODGE THE EAGLE", 0, H*0.085);
  ctx.restore();
}
function drawKillBanner(){
  const b = IS_CONTROL ? mKillBanner : killBanner;
  if(!b || now>=b.until) return;
  const life=(b.until-now)/1900; const t=now/1000; const pulse=0.5+0.5*Math.sin(t*18);
  ctx.save(); ctx.translate(W/2, H*0.42);
  const s=1+0.12*pulse+(1-life)*0.1; ctx.scale(s,s);
  ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.globalAlpha=Math.min(1,life*3);
  ctx.font="900 "+Math.round(H*0.085)+"px Bungee, system-ui, sans-serif";
  ctx.lineWidth=Math.max(4,H*0.012); ctx.strokeStyle="rgba(0,0,0,.9)";
  ctx.shadowColor="rgba(255,60,90,.95)"; ctx.shadowBlur=25+45*pulse; ctx.fillStyle="#ff3b6b";
  ctx.strokeText(b.label,0,0); ctx.fillText(b.label,0,0); ctx.shadowBlur=0;
  ctx.font="700 "+Math.round(H*0.03)+"px 'Chakra Petch', system-ui, sans-serif";
  ctx.fillStyle="#ffd0dc"; ctx.fillText((b.name||"").toUpperCase(),0,H*0.07);
  ctx.restore();
}
function drawSlowmo(){
  const on = IS_CONTROL ? mSlowmo : finishing;
  if(!on) return;
  const t=now/1000; const pulse=0.5+0.5*Math.sin(t*6);
  ctx.save();
  ctx.fillStyle="rgba(0,0,0,.55)"; ctx.fillRect(0,0,W,H*0.10); ctx.fillRect(0,H*0.90,W,H*0.10);
  ctx.translate(W/2,H*0.5); ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.font="900 "+Math.round(H*0.05)+"px Bungee, system-ui, sans-serif";
  ctx.globalAlpha=0.5+0.4*pulse; ctx.shadowColor="rgba(255,210,60,.9)"; ctx.shadowBlur=30;
  ctx.fillStyle="#ffd23f"; ctx.fillText("FINAL BLOW",0,0);
  ctx.restore();
}
function drawBird(){
  if(!bird.active) return;
  const px = ox + bird.cx*cell + cell/2;
  const py = oy + (bird.cy + Math.sin(bird.bob)*0.35)*cell + cell/2;
  const size = cell*8;
  // shadow on the ground
  ctx.save();
  ctx.globalAlpha=0.22; ctx.fillStyle="#000";
  ctx.beginPath(); ctx.ellipse(px, oy + Math.min(bird.cy+2,CONFIG.ROWS-1)*cell + cell/2, size*0.28, size*0.09, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // carried snake dangling below
  if(bird.carrying && bird.carryCells){
    const av = getAvatar((players.get(bird.carrying)||{}).avatar);
    ctx.save();
    ctx.strokeStyle="rgba(255,255,255,.5)"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(px, py+size*0.2); ctx.lineTo(px, py+size*0.55); ctx.stroke();
    const r=cell*0.7;
    ctx.beginPath(); ctx.arc(px, py+size*0.6, r, 0, Math.PI*2); ctx.closePath();
    if(av){ ctx.save(); ctx.clip(); try{ ctx.drawImage(av, px-r, py+size*0.6-r, r*2, r*2); }catch(_){} ctx.restore(); }
    else { ctx.fillStyle="#4be08a"; ctx.fill(); }
    ctx.restore();
  }
  // the eagle (flip based on flight direction)
  ctx.save();
  ctx.translate(px, py);
  if(bird.dirX<0) ctx.scale(-1,1);
  const iw=size, ih=size*(birdImg.naturalHeight||160)/(birdImg.naturalWidth||153);
  if(birdImg.complete && birdImg.naturalWidth){ try{ ctx.drawImage(birdImg, -iw/2, -ih/2, iw, ih); }catch(_){} }
  else { ctx.fillStyle="#5a3a1a"; ctx.beginPath(); ctx.moveTo(-iw/2,0); ctx.lineTo(0,-ih/3); ctx.lineTo(iw/2,0); ctx.lineTo(0,ih/6); ctx.closePath(); ctx.fill(); }
  ctx.restore();
}

const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rnd=(a,b)=>a+Math.random()*(b-a);
const manhattan=(ax,ay,bx,by)=>Math.abs(ax-bx)+Math.abs(ay-by);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function hash(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function colorFor(id){
  const hue=hash(id)%360;
  return { hue, body:`hsl(${hue} 85% 60%)`, dim:`hsl(${hue} 70% 45%)`, glow:`hsl(${hue} 95% 65%)` };
}
function initial(name){return (name||"?").trim().charAt(0).toUpperCase()||"?";}
function hashStr(s){ s=String(s); let h=0; for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))|0; } return (h>>>0).toString(36); }

/* avatar image cache (display only; never read back so cross-origin is fine) */
const imgCache=new Map();
function getAvatar(url){
  if(!url) return null;
  let e=imgCache.get(url);
  if(!e){ e={img:new Image(),ok:false}; e.img.onload=()=>{e.ok=true;}; e.img.onerror=()=>{e.ok=false;}; e.img.src=url; imgCache.set(url,e); }
  return e.ok? e.img : null;
}
/* generated fallback avatar for test bots (offline-safe data URI) */
function botAvatar(id,name){
  const c=colorFor(id);
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='96' height='96'>
    <rect width='96' height='96' fill='hsl(${c.hue} 45% 22%)'/>
    <circle cx='48' cy='38' r='20' fill='hsl(${c.hue} 80% 60%)'/>
    <rect x='20' y='60' width='56' height='40' rx='20' fill='hsl(${c.hue} 70% 50%)'/>
    <text x='48' y='55' font-family='sans-serif' font-size='34' font-weight='bold' fill='#0b0b1e' text-anchor='middle'>${initial(name)}</text>
  </svg>`;
  return "data:image/svg+xml;utf8,"+encodeURIComponent(svg);
}

/* ============================ AUDIO (optional, muted by default) ============================ */
let actx=null;
function beep(freq,dur,type,vol){
  if(!soundOn) return;
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.type=type||"triangle"; o.frequency.value=freq;
    g.gain.value=vol||0.05; o.connect(g); g.connect(actx.destination);
    o.start(); g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+(dur||0.15)); o.stop(actx.currentTime+(dur||0.15));
  }catch(_){}
}
function ping(kind){
  if(kind==="join") beep(660,.12,"sine",.04);
  else if(kind==="big") beep(180,.25,"sawtooth",.06);
  else if(kind==="kill") beep(300,.10,"square",.05);
  else if(kind==="double"){ beep(400,.10,"square",.05); setTimeout(()=>beep(520,.12,"square",.05),90); }
  else if(kind==="triple"){ beep(440,.10,"square",.05); setTimeout(()=>beep(560,.10,"square",.05),90); setTimeout(()=>beep(700,.16,"square",.06),180); }
  else if(kind==="mega"){ beep(200,.3,"sawtooth",.07); setTimeout(()=>beep(120,.4,"sawtooth",.07),120); }
  else if(kind==="meteor"){ beep(90,.5,"sawtooth",.07); }
  else if(kind==="bolt"){ beep(1200,.08,"square",.05); setTimeout(()=>beep(700,.12,"square",.04),60); }
  else if(kind==="bird"){ beep(900,.12,"triangle",.05); setTimeout(()=>beep(1100,.10,"triangle",.04),80); }
  else if(kind==="golden"){ beep(784,.10,"sine",.05); setTimeout(()=>beep(1047,.16,"sine",.05),100); }
  else if(kind==="win"){ beep(523,.15,"square",.05); setTimeout(()=>beep(659,.15,"square",.05),140); setTimeout(()=>beep(784,.3,"square",.05),300); }
}

/* ============================ SIZING ============================ */
function resize(){
  dpr = Math.min(window.devicePixelRatio||1, 2);
  W = cv.clientWidth; H = cv.clientHeight;
  cv.width = Math.floor(W*dpr); cv.height = Math.floor(H*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const pad = 24;
  cell = Math.min((W-pad*2)/CONFIG.COLS, (H-pad*2)/CONFIG.ROWS);
  ox = (W - cell*CONFIG.COLS)/2;
  oy = (H - cell*CONFIG.ROWS)/2;
}
window.addEventListener("resize", resize);

const c2p=(x,y)=>({ x: ox + x*cell + cell/2, y: oy + y*cell + cell/2 });

/* ============================ STORM ============================ */
function battleElapsed(){ return (now - battleStart)/1000; }
function stormT(){
  if(phase!=="battle") return 0;
  const e=battleElapsed();
  return clamp((e - CONFIG.stormStartSec)/(CONFIG.stormFullSec - CONFIG.stormStartSec), 0, 1);
}
function updateStorm(){
  const t=stormT();
  const cx=CONFIG.COLS/2, cy=CONFIG.ROWS/2;
  const hx=lerp(CONFIG.COLS/2, CONFIG.COLS*0.11, t);
  const hy=lerp(CONFIG.ROWS/2, CONFIG.ROWS*0.11, t);
  safe={x0:cx-hx, y0:cy-hy, x1:cx+hx, y1:cy+hy};
}
function isStorm(x,y){
  const cx=x+0.5, cy=y+0.5;
  return cx<safe.x0 || cx>safe.x1 || cy<safe.y0 || cy>safe.y1;
}
function randSafeCell(){
  const x0=Math.ceil(safe.x0), x1=Math.floor(safe.x1)-1;
  const y0=Math.ceil(safe.y0), y1=Math.floor(safe.y1)-1;
  return { x: clamp((x0+Math.random()*(Math.max(1,x1-x0)))|0,0,CONFIG.COLS-1),
           y: clamp((y0+Math.random()*(Math.max(1,y1-y0)))|0,0,CONFIG.ROWS-1) };
}

/* ============================ FOOD ============================ */
function spawnFood(){
  for(let tries=0;tries<40;tries++){
    const p=randSafeCell();
    if(isStorm(p.x,p.y)) continue;
    if(foods.some(f=>f.x===p.x&&f.y===p.y)) continue;
    if(snakes.some(s=>s.alive&&s.cells.some(c=>c.x===p.x&&c.y===p.y))) continue;
    foods.push(p); return;
  }
}

/* ============================ PLAYERS / EVENTS ============================ */
function ensurePlayer(user){
  let p=players.get(user.id);
  if(!p){
    if(players.size>=CONFIG.maxPlayers) return null;   // lobby is full — turn away new players
    p={ id:user.id, name:user.name||"Someone", avatar:user.avatar||"", color:colorFor(user.id), likeAccum:0 };
    players.set(user.id,p);
    addFeed("join", p, p.name+" joined!");
    ping("join");
  } else {
    if(user.avatar) p.avatar=user.avatar;
    if(user.name) p.name=user.name;
  }
  return p;
}
function snakeOf(id){ return snakes.find(s=>s.id===id && s.alive); }
function isJoinWord(txt){
  // Forgiving match: any chat that contains a join keyword counts.
  const t=(txt||"").toLowerCase().replace(/[^a-z0-9\s]/g," ");
  return CONFIG.joinWords.some(w=> t.includes(w));
}

function handleEvent(kind,user,payload){
  payload=payload||{};
  // registration rules — viewers OPT IN by typing a join word in chat.
  // Gifting/sharing also drops you in (clear intent). Room-entry ("join" kind =
  // someone entering the live) and likes do NOT auto-add unless autoJoin is on.
  if(kind==="chat"){ if(isJoinWord(payload.comment)) ensurePlayer(user); }
  else if(kind==="gift"||kind==="share") ensurePlayer(user);
  else if(kind==="join"||kind==="follow"||kind==="like"){ if(CONFIG.autoJoin) ensurePlayer(user); }

  const p=players.get(user.id);
  if(!p) return;

  if(phase==="battle"){
    const s=snakeOf(p.id);
    if(kind==="like"){
      if(s){
        s.boostSteps=Math.min(6, s.boostSteps+Math.ceil((payload.likeCount||1)/5));
        p.likeAccum+=(payload.likeCount||1);
        while(p.likeAccum>=CONFIG.likesPerGrow){ p.likeAccum-=CONFIG.likesPerGrow; s.pendingGrow++; }
      }
    } else if(kind==="share"){
      if(s){ s.shieldUntil=now+CONFIG.shieldMs; addFeed("share",p,p.name+" is shielded"); }
    } else if(kind==="gift"){
      const val=(payload.diamonds||0)*(payload.repeat||1);
      const gname=String(payload.giftName||"").toLowerCase();
      const isFingerHeart = gname.includes("finger heart")||gname.includes("fingerheart")||gname.includes("finger");
      const isRose = gname.includes("rose");
      if(s){
        s.score+=Math.max(1,Math.round(val));
        if(isFingerHeart || val>=CONFIG.rampageDiamonds){
          s.rampageUntil=now+CONFIG.rampageMs; s.shieldUntil=Math.max(s.shieldUntil, now+1600);
          addFeed("gift",p,"🔥 "+p.name+" RAMPAGE! (🫰 "+(payload.giftName||"Finger Heart")+")"); ping("big");
        } else if(isRose || val>=CONFIG.shieldDiamonds){
          s.shieldUntil=now+CONFIG.shieldMs; addFeed("gift",p,"🌹 "+p.name+" is shielded");
        } else {
          s.boostSteps=Math.min(6,s.boostSteps+2); s.pendingGrow+=2; addFeed("gift",p,"💎 "+p.name+" → grow");
        }
      } else {
        addFeed("gift",p,"💎 "+p.name+" gifted — in next round");
      }
    }
  } else if(kind==="gift"){
    addFeed("gift",p,"💎 "+p.name+" gifted — joins next round");
  }
}

/* ============================ SNAKE ENGINE ============================ */
function newSnake(p){
  const start=randSafeCell();
  const dirs=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
  const dir=dirs[(Math.random()*4)|0];
  const cells=[];
  for(let i=0;i<CONFIG.startLen;i++){
    cells.push({ x:clamp(start.x - dir.x*i,0,CONFIG.COLS-1), y:clamp(start.y - dir.y*i,0,CONFIG.ROWS-1) });
  }
  return {
    id:p.id, name:p.name, avatar:p.avatar, color:p.color,
    cells, prevCells:cells.map(c=>({x:c.x,y:c.y})), head:cells[0], dir,
    alive:true, deadAt:0, score:0, pendingGrow:0, boostSteps:0, kills:0, lastKillAt:0, killStreak:0,
    shieldUntil:0, rampageUntil:0,
  };
}
function aliveSnakes(){ return snakes.filter(s=>s.alive); }

function buildOccupancy(){
  const occ=new Map();
  for(const s of snakes){ if(!s.alive) continue; for(const c of s.cells){ occ.set(c.x+","+c.y, s.id); } }
  return occ;
}
function freeNeighbors(x,y,occ){
  let n=0;
  const dd=[[1,0],[-1,0],[0,1],[0,-1]];
  for(const [dx,dy] of dd){
    const nx=x+dx, ny=y+dy;
    if(nx<0||ny<0||nx>=CONFIG.COLS||ny>=CONFIG.ROWS) continue;
    if(isStorm(nx,ny)) continue;
    if(occ.get(nx+","+ny)) continue;
    n++;
  }
  return n;
}
// How much open room is reachable from (sx,sy) — bounded flood fill. Stops snakes trapping themselves.
function openSpace(sx,sy,occ,cap){
  if(sx<0||sy<0||sx>=CONFIG.COLS||sy>=CONFIG.ROWS) return 0;
  if(occ.get(sx+","+sy)||isStorm(sx,sy)) return 0;
  const seen=new Set([sx+","+sy]); let head=0; const q=[[sx,sy]]; let c=0;
  const dd=[[1,0],[-1,0],[0,1],[0,-1]];
  while(head<q.length && c<cap){
    const cur=q[head++]; c++;
    for(const [dx,dy] of dd){
      const nx=cur[0]+dx, ny=cur[1]+dy, k=nx+","+ny;
      if(nx<0||ny<0||nx>=CONFIG.COLS||ny>=CONFIG.ROWS) continue;
      if(seen.has(k)||occ.get(k)||isStorm(nx,ny)) continue;
      seen.add(k); q.push([nx,ny]);
    }
  }
  return c;
}
function nearestFood(s){
  let best=null,bd=1e9;
  for(const f of foods){ const d=manhattan(s.head.x,s.head.y,f.x,f.y); if(d<bd){bd=d;best=f;} }
  return best;
}
function nearestEnemyHead(s){
  let best=null,bd=1e9;
  for(const o of snakes){ if(!o.alive||o.id===s.id) continue; const d=manhattan(s.head.x,s.head.y,o.head.x,o.head.y); if(d<bd){bd=d;best=o.head;} }
  return best;
}
function chooseDir(s,occ){
  const dirs=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
  const back={x:-s.dir.x,y:-s.dir.y};
  const shielded=s.shieldUntil>now, rampage=s.rampageUntil>now;
  const goldenTarget = (!rampage && golden) ? {x:golden.x,y:golden.y} : null;
  const target = rampage ? nearestEnemyHead(s) : (goldenTarget || nearestFood(s));
  const chasingGold = !!goldenTarget && target===goldenTarget;
  const pull=stormT();
  let best=s.dir, bestScore=-1e18;
  for(const d of dirs){
    if(d.x===back.x && d.y===back.y) continue;
    const nx=s.head.x+d.x, ny=s.head.y+d.y;
    let score=0;
    const outWall=nx<0||ny<0||nx>=CONFIG.COLS||ny>=CONFIG.ROWS;
    const inStorm=isStorm(nx,ny);
    const occId=occ.get(nx+","+ny);
    let lethal=false;
    if(outWall) lethal=true;
    else if(!shielded){
      if(inStorm) lethal=true;
      else if(occId===s.id) lethal=true;
      else if(occId && occId!==s.id && !rampage) lethal=true;
    }
    if(lethal) score-=1e9;
    if(target){ const w = chasingGold ? 6 : 1; score -= manhattan(nx,ny,target.x,target.y)*w; }
    // pull toward center as storm tightens
    score -= pull*8 * ((Math.abs((nx+0.5)-CONFIG.COLS/2)+Math.abs((ny+0.5)-CONFIG.ROWS/2))/(CONFIG.COLS+CONFIG.ROWS));
    if(d.x===s.dir.x && d.y===s.dir.y) score+=0.7;      // momentum
    if(!outWall) score += freeNeighbors(nx,ny,occ)*CONFIG.aiCaution;  // dead-end avoidance (difficulty)
    // self-preservation: strongly prefer directions with lots of reachable open space (always on)
    if(!lethal && !outWall) score += Math.min(openSpace(nx,ny,occ,64),64)*0.16;
    // dodge the bird when it's hunting nearby (shielded/rampaging don't care)
    if(bird.active && !bird.carrying && !shielded && !rampage){
      const bx=Math.floor(bird.cx), by=Math.floor(bird.cy);
      const bd=Math.abs(nx-bx)+Math.abs(ny-by);
      if(bd<9) score -= (9-bd)*2.5;
    }
    score += Math.random()*CONFIG.aiJitter*(chasingGold?0.25:1);
    if(score>bestScore){ bestScore=score; best=d; }
  }
  return best;
}
function killSnake(s,cause,killer){
  if(!s.alive) return;
  s.alive=false; s.deadAt=now;
  if(killer && killer.alive && killer.id!==s.id) creditKill(killer,s);
}
function creditKill(k,victim){
  k.kills=(k.kills||0)+1;
  if(now-(k.lastKillAt||0) < 3800) k.killStreak=(k.killStreak||0)+1; else k.killStreak=1;
  k.lastKillAt=now;
  addFeed("kill", players.get(k.id)||{name:k.name,avatar:k.avatar}, "⚔️ "+k.name+" eliminated "+victim.name);
  ping("kill");
  if(k.killStreak>=2) showKillBanner(k.killStreak, k.name);
}
function showKillBanner(n,name){
  const label = n===2?"DOUBLE KILL!" : n===3?"TRIPLE KILL!" : n===4?"MONSTER KILL!" : "M A S S A C R E !";
  killBanner={ label, name, until:now+1900 };
  ping(n>=4?"mega":n===3?"triple":"double");
}
function stepSnake(s,occ){
  const d=chooseDir(s,occ); s.dir=d;
  const nx=s.head.x+d.x, ny=s.head.y+d.y;
  const shielded=s.shieldUntil>now, rampage=s.rampageUntil>now;
  if(nx<0||ny<0||nx>=CONFIG.COLS||ny>=CONFIG.ROWS){ killSnake(s,"wall"); return; }
  if(!shielded && isStorm(nx,ny)){ killSnake(s,"storm"); return; }
  const occId=occ.get(nx+","+ny);
  if(occId && occId!==s.id){
    if(rampage){
      const victim=snakes.find(z=>z.id===occId && z.alive);
      if(victim){ killSnake(victim,"rampage",s); s.score+=5; }
      // remove victim cells from occ so we can pass
      if(victim){ for(const c of victim.cells) occ.delete(c.x+","+c.y); }
    } else if(!shielded){ const killer=snakes.find(z=>z.id===occId && z.alive); killSnake(s,"crash",killer); return; }
  } else if(occId===s.id && !shielded){ killSnake(s,"self"); return; }
  // advance
  s.cells.unshift({x:nx,y:ny}); s.head=s.cells[0];
  occ.set(nx+","+ny,s.id);
  tryGolden(s,nx,ny);
  // food
  const fi=foods.findIndex(f=>f.x===nx&&f.y===ny);
  if(fi>=0){ foods.splice(fi,1); s.score+=1; s.pendingGrow++; spawnFood(); }
  let grow=false;
  if(s.pendingGrow>0){ s.pendingGrow--; grow=true; }
  if(!grow){ const tail=s.cells.pop(); if(tail && occ.get(tail.x+","+tail.y)===s.id) occ.delete(tail.x+","+tail.y); }
}
function tick(){
  if(phase!=="battle") return;
  for(const s of snakes){ if(s.alive) s.prevCells=s.cells.map(c=>({x:c.x,y:c.y})); }
  updateStorm();
  const order=shuffle(aliveSnakes());
  const occ=buildOccupancy();
  for(const s of order){
    if(!s.alive) continue;
    const steps=1+(s.boostSteps>0?1:0);
    if(s.boostSteps>0) s.boostSteps--;
    for(let k=0;k<steps;k++){ if(!s.alive) break; stepSnake(s,occ); }
  }
  while(foods.length<CONFIG.foodCount) spawnFood();
  // remove long-dead snakes
  snakes = snakes.filter(s=>s.alive || (now-s.deadAt)<650);
  const alive=aliveSnakes();
  if(!finishing && (alive.length<=1 || battleElapsed()>CONFIG.hardCapSec)){
    finishing=true; slowmoUntil=now+5000;
  }
  if(finishing && now>=slowmoUntil){ finishing=false; slowmoUntil=0; endBattle(); }
}

/* ============================ PHASE MACHINE ============================ */
function startLobby(){
  phase="lobby";
  lastRosterCount=-1;
  lobbyEndsAt = now + CONFIG.lobbySeconds*1000;
  snakes=[]; foods=[]; confetti=[]; winner=null;
  renderOverlay();
}
function startBattle(){
  const roster=[...players.values()].slice(0, CONFIG.maxPlayers);
  if(roster.length===0){ startLobby(); return; }
  round++;
  document.getElementById("roundNum").textContent=round;
  phase="battle"; battleStart=now; lastTick=now;
  bird.active=false; bird.carrying=null; nextBirdAt = now + BIRD_EVERY;
  meteor.phase="idle"; bolts=[]; golden=null;
  killBanner=null; finishing=false; slowmoUntil=0;
  nextMeteorAt = now + METEOR_EVERY*0.6; nextBoltAt = now + BOLT_EVERY*0.8; nextGoldenAt = now + GOLDEN_EVERY*0.4;
  updateStorm();
  snakes = roster.map(p=>newSnake(p));
  roundRoster = snakes.slice();
  foods=[]; while(foods.length<CONFIG.foodCount) spawnFood();
  renderOverlay();
  if(snakes.length===1){ endBattle(); }
}
function endBattle(){
  const alive=aliveSnakes();
  if(alive.length===1) winner=alive[0];
  else {
    // highest score among this round's participants
    let best=null;
    for(const s of roundRoster){ if(!best || s.score>best.score) best=s; }
    winner=best;
  }
  phase="winner";
  // MVP = most kills this round (falls back to the winner)
  mvp=null; let mk=-1;
  for(const s of roundRoster){ if((s.kills||0)>mk){ mk=s.kills||0; mvp=s; } }
  if(mk<=0) mvp=winner;
  winnerEndsAt = now + CONFIG.winnerSeconds*1000;
  if(IS_ENGINE) recordWin(winner);
  spawnConfetti();
  ping("win");
  if(IS_ENGINE) playApplause();
  renderOverlay();
}

/* ============================ CONFETTI ============================ */
function spawnConfetti(){
  confetti=[];
  const colors=["#ffcf3d","#ff2d75","#39e0ff","#c6ff3d","#8a5bff","#ffffff"];
  for(let i=0;i<160;i++){
    confetti.push({ x:W/2+rnd(-60,60), y:H*0.32, vx:rnd(-6,6), vy:rnd(-13,-4),
      g:rnd(0.15,0.3), size:rnd(4,9), col:colors[(Math.random()*colors.length)|0], rot:rnd(0,6.28), vr:rnd(-0.3,0.3), life:0 });
  }
}
function updateConfetti(dt){
  for(const c of confetti){ c.vy+=c.g; c.x+=c.vx; c.y+=c.vy; c.rot+=c.vr; c.life+=dt; }
  confetti=confetti.filter(c=>c.y<H+40 && c.life<6000);
}

/* ============================ RENDER ============================ */
function drawArena(){
  ctx.clearRect(0,0,W,H);
  if(!document.body.classList.contains("transparent")){
    ctx.fillStyle="#08081a";
    roundRect(ox-6,oy-6,cell*CONFIG.COLS+12,cell*CONFIG.ROWS+12,14); ctx.fill();
  }
  // grid
  ctx.strokeStyle="rgba(57,224,255,0.06)"; ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=0;x<=CONFIG.COLS;x++){ const px=ox+x*cell; ctx.moveTo(px,oy); ctx.lineTo(px,oy+cell*CONFIG.ROWS); }
  for(let y=0;y<=CONFIG.ROWS;y++){ const py=oy+y*cell; ctx.moveTo(ox,py); ctx.lineTo(ox+cell*CONFIG.COLS,py); }
  ctx.stroke();
  // arena border
  ctx.strokeStyle="rgba(138,91,255,0.35)"; ctx.lineWidth=2;
  roundRect(ox,oy,cell*CONFIG.COLS,cell*CONFIG.ROWS,10); ctx.stroke();
}
function drawStorm(){
  if(phase!=="battle") return;
  const t=stormT();
  if(t<=0) return;
  // shade the danger zone
  ctx.save();
  ctx.beginPath();
  ctx.rect(ox,oy,cell*CONFIG.COLS,cell*CONFIG.ROWS);
  const sx=ox+clamp(safe.x0,0,CONFIG.COLS)*cell, sy=oy+clamp(safe.y0,0,CONFIG.ROWS)*cell;
  const sw=clamp(safe.x1-safe.x0,0,CONFIG.COLS)*cell, sh=clamp(safe.y1-safe.y0,0,CONFIG.ROWS)*cell;
  ctx.rect(sx+sw,sy,-sw,sh); // reverse -> even-odd hole
  ctx.fillStyle="rgba(255,45,117,"+(0.10+0.10*Math.sin(now/250))+")";
  ctx.fill("evenodd");
  ctx.restore();
  // safe border
  ctx.strokeStyle="rgba(255,207,61,0.85)"; ctx.lineWidth=2.5;
  ctx.setLineDash([8,6]); ctx.lineDashOffset=-now/40;
  roundRect(sx,sy,sw,sh,6); ctx.stroke(); ctx.setLineDash([]);
}
function drawFood(){
  const r=cell*0.24;
  for(const f of foods){
    const p=c2p(f.x,f.y);
    const pulse=1+0.18*Math.sin(now/220 + f.x + f.y);
    ctx.beginPath(); ctx.arc(p.x,p.y,r*pulse,0,7);
    ctx.fillStyle="#c6ff3d"; ctx.shadowColor="#c6ff3d"; ctx.shadowBlur=12; ctx.fill(); ctx.shadowBlur=0;
  }
}
function interpCell(s,i,t){
  const cur=s.cells[i];
  const prev=(s.prevCells&&s.prevCells[i])||cur;
  return { x: lerp(prev.x,cur.x,t), y: lerp(prev.y,cur.y,t) };
}
function drawSnake(s){
  const t = phase==="battle" && s.alive ? clamp((now-lastTick)/CONFIG.tickMs,0,1) : 1;
  const deadFade = s.alive?1: clamp(1-(now-s.deadAt)/650,0,1);
  ctx.globalAlpha = deadFade;
  const rBody=cell*0.40;
  // body (tail -> neck)
  for(let i=s.cells.length-1;i>=1;i--){
    const ic=interpCell(s,i,t); const p=c2p(ic.x,ic.y);
    const fade = 0.35 + 0.55*(1 - i/s.cells.length);
    ctx.globalAlpha = deadFade*fade;
    ctx.beginPath(); ctx.arc(p.x,p.y,rBody,0,7);
    ctx.fillStyle=s.color.body; ctx.fill();
  }
  ctx.globalAlpha=deadFade;
  // head
  const hc=interpCell(s,0,t); const hp=c2p(hc.x,hc.y);
  const rHead=cell*0.62;
  const shielded=s.shieldUntil>now, rampage=s.rampageUntil>now;
  // aura
  if(rampage){
    ctx.beginPath(); ctx.arc(hp.x,hp.y,rHead+6+2*Math.sin(now/90),0,7);
    ctx.fillStyle="rgba(255,120,40,0.30)"; ctx.fill();
  } else if(shielded){
    ctx.beginPath(); ctx.arc(hp.x,hp.y,rHead+5,0,7);
    ctx.strokeStyle="rgba(57,224,255,"+(0.6+0.3*Math.sin(now/120))+")"; ctx.lineWidth=3; ctx.stroke();
  }
  // ring
  ctx.beginPath(); ctx.arc(hp.x,hp.y,rHead+2,0,7);
  ctx.fillStyle= rampage? "#ff9a3d" : s.color.glow; ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=14; ctx.fill(); ctx.shadowBlur=0;
  // avatar or fallback
  const img=getAvatar(s.avatar);
  ctx.save();
  ctx.beginPath(); ctx.arc(hp.x,hp.y,rHead,0,7); ctx.closePath(); ctx.clip();
  if(img){
    const iw=img.naturalWidth||1, ih=img.naturalHeight||1;
    const scale=Math.max((rHead*2)/iw,(rHead*2)/ih);
    const dw=iw*scale, dh=ih*scale;
    try{ ctx.drawImage(img,hp.x-dw/2,hp.y-dh/2,dw,dh); }catch(_){ fillHead(); }
  } else { fillHead(); }
  ctx.restore();
  function fillHead(){
    ctx.fillStyle=s.color.dim; ctx.fillRect(hp.x-rHead,hp.y-rHead,rHead*2,rHead*2);
    ctx.fillStyle="#0b0b1e"; ctx.font="bold "+Math.round(rHead*1.1)+"px Bungee, sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(initial(s.name),hp.x,hp.y+2);
  }
  // name label
  if(s.alive){
    ctx.font="600 "+clamp(cell*0.42,9,15)+"px 'Chakra Petch', sans-serif";
    ctx.textAlign="center"; ctx.textBaseline="bottom";
    const label=s.name.length>14? s.name.slice(0,13)+"…" : s.name;
    const tw=ctx.measureText(label).width;
    ctx.fillStyle="rgba(6,6,20,0.7)";
    roundRect(hp.x-tw/2-6, hp.y-rHead-20, tw+12, 16, 6); ctx.fill();
    ctx.fillStyle="#eef0ff"; ctx.fillText(label,hp.x,hp.y-rHead-6);
  }
  ctx.globalAlpha=1;
}
function drawConfetti(){
  for(const c of confetti){
    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot);
    ctx.fillStyle=c.col; ctx.fillRect(-c.size/2,-c.size/2,c.size,c.size*0.6); ctx.restore();
  }
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

/* ============================ MAIN LOOP ============================ */
let lastFrame=performance.now();
function loop(){
  now=performance.now();
  const dt=now-lastFrame; lastFrame=now;

  if(!IS_CONTROL){
    // phase timers (engine/solo only)
    if(phase==="lobby"){
      if(now>=lobbyEndsAt){
        if(players.size>=CONFIG.minPlayers) startBattle();
        else lobbyEndsAt=now+8000; // extend, wait for players
      }
    } else if(phase==="battle"){
      const iv = finishing ? CONFIG.tickMs*4 : CONFIG.tickMs;
      while(now-lastTick>=iv){ lastTick+=iv; tick(); if(phase!=="battle") break; }
    } else if(phase==="winner"){
      if(now>=winnerEndsAt) startLobby();
    }
  }
  updateConfetti(dt);
  if(!IS_CONTROL && phase==="battle") updateBird(dt);
  if(!IS_CONTROL && phase==="battle") updateHazards();

  // HUD
  document.getElementById("phasePill").textContent = phase==="battle"?"BATTLE":phase.toUpperCase();
  document.getElementById("aliveNum").textContent = IS_CONTROL ? mirrorAlive : (phase==="battle"? aliveSnakes().length : players.size);
  document.getElementById("totalNum").textContent = IS_CONTROL ? mirrorTotal : (phase==="battle"? roundRoster.length : players.size);
  const stormWrap=document.getElementById("stormWrap");
  if(phase==="battle"){ stormWrap.style.display="block"; document.getElementById("stormFill").style.width=((IS_CONTROL?mirrorStorm:stormT())*100).toFixed(0)+"%"; }
  else stormWrap.style.display="none";

  // draw
  drawArena();
  drawStorm();
  if(phase==="battle") drawFood();
  for(const s of snakes) drawSnake(s);
  if(phase==="battle") drawHazards();
  if(phase==="battle") drawBird();
  if(phase==="battle") drawBirdWarning();
  if(phase==="battle") drawSlowmo();
  if(phase==="battle") drawKillBanner();
  if(phase==="winner") drawConfetti();

  updateOverlayLive();

  // engine broadcasts state to any control panels (throttled)
  if(IS_ENGINE && roomChan && now-lastBroadcast>120){
    lastBroadcast=now;
    try{ roomChan.send({ type:"broadcast", event:"state", payload:buildSnapshot() }); }catch(_){}
  }

  requestAnimationFrame(loop);
}

let ws=null, wsReconnect=null, wantUser="";
const connDot=document.getElementById("connDot");
const statusText=document.getElementById("statusText");
function setStatus(state,msg){
  connDot.className="dot "+(state==="connected"?"on":state==="connecting"||state==="idle"?"wait":state==="error"||state==="offline"?"err":"");
  if(msg) statusText.textContent=msg;
}
function connectBridge(){
  // CLOUD MODE: if Supabase is configured, there is no local bridge — just listen to Realtime.
  if(CONFIG.sbUrl && CONFIG.sbAnon){
    if(!sbChan) connectSupabase();
    else setStatus("connected","Live via Supabase Realtime");
    return;
  }
  try{ if(ws) ws.close(); }catch(_){}
  setStatus("connecting","Connecting to bridge…");
  ws=new WebSocket(CONFIG.wsUrl);
  ws.onopen=()=>{ setStatus("connecting","Bridge connected. Connecting to live…"); if(wantUser) ws.send(JSON.stringify({cmd:"connect",username:wantUser})); };
  ws.onclose=()=>{ setStatus("error","Bridge offline — is bridge.js running?"); scheduleReconnect(); };
  ws.onerror=()=>{ setStatus("error","Can't reach bridge at "+CONFIG.wsUrl); };
  ws.onmessage=(ev)=>{
    let m; try{ m=JSON.parse(ev.data); }catch{ return; }
    if(m.type==="status"){ setStatus(m.state,m.message||""); }
    else if(m.type==="event"){ handleEvent(m.kind, m.user||{}, m); }
  };
}
function scheduleReconnect(){ clearTimeout(wsReconnect); wsReconnect=setTimeout(()=>{ if((wantUser||simOn===false) && !(CONFIG.sbUrl&&CONFIG.sbAnon)) connectBridge(); },3000); }

/* ============================ SUPABASE REALTIME (cloud mode) ============================ */
let sb=null, sbChan=null;
function connectSupabase(){
  if(!CONFIG.sbUrl || !CONFIG.sbAnon){ return false; }
  if(!window.supabase || !window.supabase.createClient){ setStatus("error","supabase-js failed to load"); return false; }
  try{
    sb = window.supabase.createClient(CONFIG.sbUrl, CONFIG.sbAnon, { realtime:{ params:{ eventsPerSecond:20 } } });
    setStatus("connecting", IS_CONTROL ? "Connecting control panel…" : "Connecting to Supabase…");
    if(IS_ENGINE){
      sbChan = sb.channel("snake-events")
        .on("postgres_changes", { event:"INSERT", schema:"public", table:"events" }, (msg)=>{
          const r = msg.new || {};
          const rawName = r.user_name || "anon";
          const stableId = r.user_id ? String(r.user_id) : ("nm_" + hashStr(rawName));
          const user = { id:stableId, name:rawName, avatar:r.user_avatar||botAvatar(stableId, rawName) };
          const payload = (r.payload && typeof r.payload==="object") ? r.payload : {};
          if(r.kind) handleEvent(r.kind, user, payload);
        })
        .subscribe((st)=>{
          if(st==="SUBSCRIBED"){ setStatus("connected", ROLE==="engine" ? "Engine live · viewers can join" : "Live via Supabase Realtime"); fetchLeaderboard(); }
          else if(st==="CHANNEL_ERROR"||st==="TIMED_OUT") setStatus("error","Supabase realtime error — retrying…");
        });
    } else {
      sbChan = { }; // control panel doesn't ingest events
      setStatus("connected","Control panel · driving the engine");
      fetchLeaderboard();
    }
    connectRoom();
    return true;
  }catch(e){ setStatus("error","Supabase init failed: "+(e&&e.message||e)); return false; }
}

let nextMeteorAt = 0; const METEOR_EVERY = 17000, METEOR_WARN = 1600, METEOR_R = 3;

function inRadius(x,y,cx,cy,r){ const dx=x-cx, dy=y-cy; return dx*dx+dy*dy <= r*r; }

function updateHazards(){
  if(phase!=="battle"){ meteor.phase="idle"; bolts=[]; golden=null; return; }
  // ---- METEOR ----
  if(meteor.phase==="idle" && now>=nextMeteorAt && aliveSnakes().length>0){
    const t=aliveSnakes()[(Math.random()*aliveSnakes().length)|0];
    meteor.x=t.head.x; meteor.y=t.head.y; meteor.r=METEOR_R;
    meteor.phase="warn"; meteor.warnUntil=now+METEOR_WARN; ping("meteor");
  } else if(meteor.phase==="warn" && now>=meteor.warnUntil){
    meteor.phase="impact"; meteor.hitAt=now;
    for(const s of aliveSnakes()){
      if(s.shieldUntil>now) continue;
      if(s.cells.some(c=>inRadius(c.x,c.y,meteor.x,meteor.y,meteor.r))) killSnake(s,"meteor");
    }
    addFeed("gift",{name:"☄️ Meteor"},"☄️ Meteor strike!");
    if(aliveSnakes().length<=1 && !finishing){ finishing=true; slowmoUntil=now+5000; }
  } else if(meteor.phase==="impact" && now-meteor.hitAt>500){
    meteor.phase="idle"; nextMeteorAt=now+METEOR_EVERY;
  }
  // ---- LIGHTNING ----
  if(!bolts.length && now>=nextBoltAt && aliveSnakes().length>0){
    for(let i=0;i<BOLT_COUNT;i++){
      const cx=(Math.random()*CONFIG.COLS)|0, cy=(Math.random()*CONFIG.ROWS)|0;
      const cells=[];
      for(const [dx,dy] of [[0,0],[1,0],[0,1],[1,1],[2,0],[0,2]]){
        const x=cx+dx, y=cy+dy;
        if(x>=0&&y>=0&&x<CONFIG.COLS&&y<CONFIG.ROWS) cells.push([x,y]);
      }
      bolts.push({cells, warnUntil:now+BOLT_WARN, strikeUntil:now+BOLT_WARN+BOLT_STRIKE, struck:false});
    }
    ping("bolt");
  }
  for(const b of bolts){
    if(!b.struck && now>=b.warnUntil){
      b.struck=true;
      const set=new Set(b.cells.map(c=>c[0]+","+c[1]));
      for(const s of aliveSnakes()){
        if(s.shieldUntil>now) continue;
        if(s.cells.some(c=>set.has(c.x+","+c.y))) killSnake(s,"bolt");
      }
    }
  }
  if(bolts.length && bolts.every(b=>now>=b.strikeUntil)){
    if(bolts.some(b=>b.struck)) addFeed("share",{name:"⚡ Storm"},"⚡ Lightning struck!");
    bolts=[]; nextBoltAt=now+BOLT_EVERY;
    if(aliveSnakes().length<=1 && !finishing){ finishing=true; slowmoUntil=now+5000; }
  }
  // ---- GOLDEN APPLE ----
  if(!golden && now>=nextGoldenAt){
    for(let tries=0;tries<40;tries++){
      const p=randSafeCell();
      if(isStorm(p.x,p.y)) continue;
      if(foods.some(f=>f.x===p.x&&f.y===p.y)) continue;
      golden={x:p.x,y:p.y,until:now+GOLDEN_LIFE}; break;
    }
  } else if(golden && now>=golden.until){ golden=null; nextGoldenAt=now+GOLDEN_EVERY; }
}
// called from stepSnake when a head lands on the golden apple
function tryGolden(s,nx,ny){
  if(golden && golden.x===nx && golden.y===ny){
    golden=null; nextGoldenAt=now+GOLDEN_EVERY;
    s.pendingGrow+=GOLDEN_GROW; s.score+=5;
    addFeed("gift", players.get(s.id)||{name:s.name,avatar:s.avatar}, "🍎 "+s.name+" grabbed the GOLDEN APPLE! +"+GOLDEN_GROW);
    ping("golden"); return true;
  }
  return false;
}

function drawHazards(){
  const M = IS_CONTROL ? mMeteor : meteor;
  const BS = IS_CONTROL ? mBolts : bolts;
  const G = IS_CONTROL ? mGolden : golden;
  // lightning
  for(const b of BS){
    const warn = now<b.warnUntil, strike = now>=b.warnUntil && now<b.strikeUntil;
    if(!warn && !strike) continue;
    ctx.save();
    for(const c of b.cells){ const p=c2p(c[0],c[1]);
      if(strike){ ctx.fillStyle="rgba(180,220,255,.95)"; ctx.shadowColor="#bfe3ff"; ctx.shadowBlur=18; }
      else { const pl=0.3+0.4*Math.abs(Math.sin(now/70)); ctx.fillStyle=`rgba(120,180,255,${pl*0.4})`; }
      ctx.fillRect(p.x-cell/2,p.y-cell/2,cell,cell);
    }
    ctx.restore();
  }
  // golden apple
  if(G){
    const p=c2p(G.x,G.y); const pulse=1+0.25*Math.sin(now/160);
    ctx.save(); ctx.shadowColor="#ffd23f"; ctx.shadowBlur=22;
    ctx.fillStyle="#ffd23f"; ctx.beginPath(); ctx.arc(p.x,p.y,cell*0.34*pulse,0,7); ctx.fill();
    ctx.fillStyle="#fff6c8"; ctx.beginPath(); ctx.arc(p.x-cell*0.1,p.y-cell*0.1,cell*0.10,0,7); ctx.fill();
    ctx.restore();
  }
  // meteor
  if(M && M.phase && M.phase!=="idle"){
    const p=c2p(M.x,M.y); const R=M.r*cell;
    if(M.phase==="warn"){
      const k=1-(M.warnUntil-now)/METEOR_WARN; const pl=0.4+0.5*Math.abs(Math.sin(now/80));
      ctx.save(); ctx.strokeStyle=`rgba(255,80,40,${pl})`; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(p.x,p.y,R,0,7); ctx.stroke();
      ctx.fillStyle=`rgba(255,60,30,${0.10+0.12*pl})`; ctx.beginPath(); ctx.arc(p.x,p.y,R,0,7); ctx.fill();
      // incoming rock
      const drop = (1-k)* -H*0.6;
      ctx.fillStyle="#7a4a25"; ctx.shadowColor="#ff7a2a"; ctx.shadowBlur=25;
      ctx.beginPath(); ctx.arc(p.x, p.y+drop, cell*0.7,0,7); ctx.fill();
      ctx.restore();
    } else if(M.phase==="impact"){
      const age=(now-(M.hitAt||now))/500; const rr=R*(1+age*0.6);
      ctx.save(); ctx.globalAlpha=Math.max(0,1-age);
      ctx.fillStyle="rgba(255,140,40,.85)"; ctx.shadowColor="#ff8a2a"; ctx.shadowBlur=40;
      ctx.beginPath(); ctx.arc(p.x,p.y,rr,0,7); ctx.fill();
      ctx.fillStyle="rgba(255,240,180,.9)"; ctx.beginPath(); ctx.arc(p.x,p.y,rr*0.5,0,7); ctx.fill();
      ctx.restore();
    }
  }
}
function buildSnapshot(){
  return {
    phase, round,
    secsLeft: phase==="lobby" ? Math.max(0, Math.ceil((lobbyEndsAt-now)/1000)) : 0,
    winner: winner ? { name:winner.name, avatar:winner.avatar, len:(winner.cells?winner.cells.length:0), score:winner.score||0, beat:Math.max(0,roundRoster.length-1) } : null,
    roster: [...players.values()].map(p=>({ id:p.id, name:p.name, avatar:p.avatar })),
    alive: aliveSnakes().length, total: (phase==="battle"?roundRoster.length:players.size),
    storm: stormT(),
    safe: { x0:safe.x0, y0:safe.y0, x1:safe.x1, y1:safe.y1 },
    foods: foods.map(f=>[f.x,f.y]),
    snakes: snakes.map(s=>({ id:s.id, name:s.name, avatar:s.avatar, alive:s.alive,
      cells:s.cells.map(c=>[c.x,c.y]), sh:s.shieldUntil>now?1:0, rm:s.rampageUntil>now?1:0 })),
    bird: bird.active ? { cx:bird.cx, cy:bird.cy, dirX:bird.dirX, carry:bird.carrying?1:0, cid:bird.carrying||null } : null,
    warn: birdWarnUntil>now ? 1 : 0,
    meteor: (meteor.phase&&meteor.phase!=="idle") ? { phase:meteor.phase, x:meteor.x, y:meteor.y, r:meteor.r, warnUntil:meteor.warnUntil, hitAt:meteor.hitAt } : null,
    bolts: bolts.map(b=>({ cells:b.cells, warnUntil:b.warnUntil, strikeUntil:b.strikeUntil })),
    golden: golden ? { x:golden.x, y:golden.y } : null,
    mvp: mvp ? { name:mvp.name, kills:mvp.kills||0 } : null,
    killBanner: (killBanner && now<killBanner.until) ? { label:killBanner.label, name:killBanner.name, until:killBanner.until } : null,
    slowmo: finishing ? 1 : 0,
    lb: leaderboard,
  };
}
function applySnapshot(snap){
  if(!snap) return;
  phase=snap.phase; round=snap.round||0;
  winner = snap.winner ? { name:snap.winner.name, avatar:snap.winner.avatar, cells:new Array(snap.winner.len||0), score:snap.winner.score||0 } : null;
  lobbyEndsAt = now + (snap.secsLeft||0)*1000;
  players.clear();
  for(const r of (snap.roster||[])) players.set(r.id, { id:r.id, name:r.name, avatar:r.avatar, color:colorFor(r.id), likeAccum:0 });
  lastRosterCount=-1;
  mirrorAlive=snap.alive||0; mirrorTotal=snap.total||0; mirrorStorm=snap.storm||0;
  if(snap.bird){ bird.active=true; bird.cx=snap.bird.cx; bird.cy=snap.bird.cy; bird.dirX=snap.bird.dirX; bird.carrying=snap.bird.carry?snap.bird.cid:null; }
  else bird.active=false;
  mirrorWarn = !!snap.warn;
  mMeteor = snap.meteor || null;
  mBolts = snap.bolts || [];
  mGolden = snap.golden || null;
  mvp = snap.mvp ? { name:snap.mvp.name, kills:snap.mvp.kills } : mvp;
  mKillBanner = snap.killBanner || null;
  mSlowmo = !!snap.slowmo;
  if(snap.lb){ leaderboard=snap.lb; renderLeaderboard(); }
  safe = snap.safe || safe;
  roundRoster = new Array(snap.total||0);
  foods = (snap.foods||[]).map(a=>({x:a[0],y:a[1]}));
  snakes = (snap.snakes||[]).map(o=>{
    const cells=(o.cells||[]).map(a=>({x:a[0],y:a[1]}));
    return { id:o.id, name:o.name, avatar:o.avatar, color:colorFor(o.id),
      cells, prevCells:cells.map(c=>({x:c.x,y:c.y})), head:cells[0]||{x:0,y:0}, dir:{x:1,y:0},
      alive:o.alive, deadAt:0, score:0, pendingGrow:0, boostSteps:0,
      shieldUntil:o.sh?now+99999:0, rampageUntil:o.rm?now+99999:0 };
  });
}
// Commands from the control panel, executed on the engine.
function applyCommand(c){
  if(!c||!IS_ENGINE) return;
  if(c.type==="kick"){ players.delete(c.id); const i=snakes.findIndex(s=>s.id===c.id); if(i>=0) snakes.splice(i,1); lastRosterCount=-1; }
  else if(c.type==="clear"){ players.clear(); snakes=[]; lastRosterCount=-1; }
  else if(c.type==="start"){ if(phase==="lobby" && players.size>=1) startBattle(); else if(phase==="winner") startLobby(); }
  else if(c.type==="skip"){ if(phase==="battle"){ snakes.forEach((s,i)=>{ if(i>0) s.alive=false; }); } else if(phase==="lobby"){ lobbyEndsAt=now; } }
  else if(c.type==="fx"){ fireTestFX(c.effect, c.id); }
  else if(c.type==="diff"){ setDifficulty(c.level); }
  else if(c.type==="vol"){ setApplauseVol(c.v, false); }
}
function sendCommand(c){
  if(roomChan){ try{ roomChan.send({ type:"broadcast", event:"cmd", payload:c }); }catch(_){} }
  if(IS_ENGINE) applyCommand(c); // solo applies locally too
}
// Apply a test effect to a specific player (or a random one) so effects can be verified on demand.
function fireTestFX(effect, id){
  let targetId=id;
  if(!targetId){
    const pool = phase==="battle" ? aliveSnakes().map(s=>s.id) : [...players.keys()];
    if(!pool.length){ // nobody in — drop a test player in first
      const tid="test_"+((Math.random()*1e6)|0);
      handleEvent("chat",{id:tid,name:"FX Test",avatar:botAvatar(tid,"FX Test")},{comment:"join"});
      targetId=tid;
    } else targetId=pool[(Math.random()*pool.length)|0];
  }
  const p=players.get(targetId); if(!p) return;
  const u={id:p.id,name:p.name,avatar:p.avatar};
  if(effect==="boost") handleEvent("like",u,{likeCount:20});
  else if(effect==="shield") handleEvent("gift",u,{giftName:"Rose",diamonds:1,repeat:1});
  else if(effect==="rampage") handleEvent("gift",u,{giftName:"Finger Heart",diamonds:5,repeat:1});
}
function connectRoom(){
  if(!sb) return;
  roomChan = sb.channel("snake-room", { config:{ broadcast:{ self:false } } });
  if(IS_CONTROL){
    roomChan.on("broadcast", { event:"state" }, (m)=>{ applySnapshot(m.payload); });
  } else {
    roomChan.on("broadcast", { event:"cmd" }, (m)=>{ applyCommand(m.payload); });
  }
  roomChan.subscribe();
}


let simOn=false, simTimers=[];
const botNames=["Ava","Kai","Zoe","Milo","Nova","Rex","Luna","Finn","Iris","Dex","Remy","Sage","Juno","Cleo","Bo","Wren","Otis","Pia","Ken","Suki","Yuki","Marc","Tia","Ozzy","Q","Rio","Vee","Nix","Lux","Ivy"];
function spawnBotOnce(){
  const id="bot_"+((Math.random()*1e6)|0);
  const name=botNames[(Math.random()*botNames.length)|0]+((Math.random()*90)|0);
  handleEvent("chat",{id,name,avatar:botAvatar(id,name)},{comment:"join"});
}
function botTraffic(){
  const ids=[...players.keys()].filter(k=>k.startsWith("bot_"));
  if(ids.length<CONFIG.minPlayers+2 && Math.random()<0.7) spawnBotOnce();
  else if(Math.random()<0.15) spawnBotOnce();
  if(phase==="battle" && ids.length){
    const id=ids[(Math.random()*ids.length)|0];
    const p=players.get(id); if(!p) return;
    const r=Math.random();
    if(r<0.55) handleEvent("like",{id,name:p.name,avatar:p.avatar},{likeCount:(Math.random()*15|0)+1});
    else if(r<0.75) handleEvent("share",{id,name:p.name,avatar:p.avatar},{});
    else { const dia=[1,5,5,10,10,50,100,299][(Math.random()*8)|0]; handleEvent("gift",{id,name:p.name,avatar:p.avatar},{giftName:"Gift",diamonds:dia,repeat:(Math.random()*3|0)+1}); }
  }
}
function startSim(){
  simOn=true;
  for(let i=0;i<CONFIG.minPlayers+3;i++) spawnBotOnce();
  simTimers.push(setInterval(botTraffic, 700));
}
function stopSim(){ simOn=false; simTimers.forEach(clearInterval); simTimers=[]; }

/* ============================ HOST CONTROLS ============================ */
const $=id=>document.getElementById(id);
$("connectBtn").onclick=()=>{
  if($("connectBtn").dataset.on==="1"){
    wantUser=""; try{ ws&&ws.send(JSON.stringify({cmd:"disconnect"})); }catch(_){}
    $("connectBtn").textContent="Connect"; $("connectBtn").dataset.on="";
    setStatus("idle","Disconnected."); return;
  }
  const u=$("userInput").value.trim().replace(/^@/,"");
  if(!u){ setStatus("error","Type the host’s @username first."); return; }
  wantUser=u; $("connectBtn").textContent="Disconnect"; $("connectBtn").dataset.on="1";
  if(!ws || ws.readyState>1) connectBridge();
  else ws.send(JSON.stringify({cmd:"connect",username:u}));
};
$("startBtn").onclick=()=>{ IS_CONTROL ? sendCommand({type:"start"}) : (phase==="lobby" && players.size>=1 ? startBattle() : phase==="winner" ? startLobby() : null); };
$("skipBtn").onclick=()=>{
  if(IS_CONTROL){ sendCommand({type:"skip"}); return; }
  if(phase==="battle"){ // force end
    if(aliveSnakes().length){ let b=aliveSnakes()[0]; for(const s of aliveSnakes()) if(s.score>b.score)b=s; while(aliveSnakes().length>1){ for(const s of aliveSnakes()) if(s!==b) killSnake(s); } }
    endBattle();
  } else if(phase==="lobby"){ if(players.size>=1) startBattle(); }
  else if(phase==="winner"){ startLobby(); }
};
$("clearBtn").onclick=()=>{ if(IS_CONTROL) sendCommand({type:"clear"}); else applyCommand({type:"clear"}); };
$("fxBoost").onclick=()=>{ IS_CONTROL ? sendCommand({type:"fx",effect:"boost"}) : fireTestFX("boost"); };
$("fxShield").onclick=()=>{ IS_CONTROL ? sendCommand({type:"fx",effect:"shield"}) : fireTestFX("shield"); };
$("fxRampage").onclick=()=>{ IS_CONTROL ? sendCommand({type:"fx",effect:"rampage"}) : fireTestFX("rampage"); };
// kick: event-delegate clicks on the lobby roster (the ✕ buttons)
overlay.addEventListener("click",(e)=>{
  const b=e.target.closest("[data-kick]"); if(!b) return;
  const id=b.getAttribute("data-kick");
  if(IS_CONTROL) sendCommand({type:"kick",id}); else applyCommand({type:"kick",id});
});
$("simChk").onchange=e=>{ if(e.target.checked) startSim(); else stopSim(); };
$("diffSel").onchange=e=>{ const lvl=e.target.value; if(IS_CONTROL) sendCommand({type:"diff",level:lvl}); else setDifficulty(lvl); };
if($("applauseVol")){
  $("applauseVol").value=Math.round(applauseVol*100);
  $("applauseVol").oninput=e=>{ const v=(+e.target.value)/100; setApplauseVol(v, IS_CONTROL); if(IS_CONTROL) sendCommand({type:"vol",v}); };
}
$("soundBtn").onclick=e=>{ soundOn=!soundOn; e.target.textContent=soundOn?"🔊":"🔇"; if(soundOn) beep(440,.08,"sine",.03); };
$("hideBtn").onclick=()=>toggleControls(false);
$("showBar").onclick=()=>toggleControls(true);
function toggleControls(show){ $("controls").classList.toggle("hidden",!show); $("showBar").classList.toggle("show",!show); }
document.addEventListener("keydown",e=>{ if(e.key==="h"||e.key==="H"){ const hidden=$("controls").classList.contains("hidden"); toggleControls(hidden); } });

/* settings modal */
function openSettings(){
  $("setWs").value=CONFIG.wsUrl; $("setLobby").value=CONFIG.lobbySeconds; $("setWinner").value=CONFIG.winnerSeconds;
  $("setMin").value=CONFIG.minPlayers; $("setMax").value=CONFIG.maxPlayers; $("setTick").value=CONFIG.tickMs;
  $("setLikeGrow").value=CONFIG.likesPerGrow; $("setShieldD").value=CONFIG.shieldDiamonds; $("setRampD").value=CONFIG.rampageDiamonds;
  $("setWords").value=CONFIG.joinWords.join(", "); $("setAuto").checked=CONFIG.autoJoin;
  $("settings").classList.add("open");
}
$("gearBtn").onclick=openSettings;
$("setCancel").onclick=()=>$("settings").classList.remove("open");
$("setSave").onclick=()=>{
  const num=(id,d)=>{ const v=parseFloat($(id).value); return isFinite(v)?v:d; };
  const newWs=$("setWs").value.trim()||CONFIG.wsUrl;
  const wsChanged=newWs!==CONFIG.wsUrl;
  CONFIG.wsUrl=newWs;
  CONFIG.lobbySeconds=num("setLobby",CONFIG.lobbySeconds);
  CONFIG.winnerSeconds=num("setWinner",CONFIG.winnerSeconds);
  CONFIG.minPlayers=num("setMin",CONFIG.minPlayers);
  CONFIG.maxPlayers=num("setMax",CONFIG.maxPlayers);
  CONFIG.tickMs=num("setTick",CONFIG.tickMs);
  CONFIG.likesPerGrow=num("setLikeGrow",CONFIG.likesPerGrow);
  CONFIG.shieldDiamonds=num("setShieldD",CONFIG.shieldDiamonds);
  CONFIG.rampageDiamonds=num("setRampD",CONFIG.rampageDiamonds);
  CONFIG.joinWords=$("setWords").value.split(",").map(s=>s.trim().toLowerCase()).filter(Boolean);
  CONFIG.autoJoin=$("setAuto").checked;
  $("settings").classList.remove("open");
  if(wsChanged && (wantUser)) connectBridge();
  if(phase==="lobby") renderOverlay();
};

/* ============================ BOOT ============================ */
function boot(){
  resize();
  setDifficulty(CONFIG.difficulty);
  // Engine role = the OBS overlay: hide host controls. Control/solo show them.
  if(!SHOW_CONTROLS || params.get("hud")==="min") toggleControls(false);
  const u=params.get("user"); if(u){ $("userInput").value=u.replace(/^@/,""); }
  startLobby();
  requestAnimationFrame(loop);
  if(params.get("sim")==="1"){ $("simChk").checked=true; startSim(); }
  if(params.get("connect")==="1" && u){ wantUser=u.replace(/^@/,""); $("connectBtn").textContent="Disconnect"; $("connectBtn").dataset.on="1"; connectBridge(); }
  if(CONFIG.sbUrl && CONFIG.sbAnon){ connectSupabase(); }
  else setStatus("idle","Enter the live host’s @username, or flip on Test bots.");
}
boot();
